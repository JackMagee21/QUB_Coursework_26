    <script src="js/useSQL.js"></script>
    <script src="js/validation.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {

        console.log( document.querySelectorAll('input[name="test"]'));

        let selectedTestId = null;
        const radioContainer = document.querySelector(".radio-container");
        const testDetailsElement = document.querySelector("#testDetials");
        const form = document.querySelector("form");
        
        const showMessage = (message, type) => {
            const messageDiv = document.querySelector("#testMessage");
            messageDiv.textContent = message;
            messageDiv.className = "message " + type;
        }
    
      const getSelectedTestDetails = async () => {
        if (!selectedTestId) {
          testDetailsElement.textContent = "No test selected.";
          return { error: "No test selected" };
        }

        const query =`SELECT Test_ID, Name, Total_Marks, Pass_Marks FROM Test WHERE Test_ID = ${selectedTestId};`;
        const result = await runQuery(query);
        return result;
      };

      radioContainer.addEventListener("change", async (event) => {
        selectedTestId = event.target.value;

        const getSelectedTestDetailsResult = await getSelectedTestDetails();

        console.log(getSelectedTestDetailsResult);

        if (!getSelectedTestDetailsResult || getSelectedTestDetailsResult.error) {
          testDetailsElement.textContent = "Error fetching test details: " + (getSelectedTestDetailsResult ? getSelectedTestDetailsResult.error : "Unknown error");
          return;
        }

        const testDetails = getSelectedTestDetailsResult.data[0];

        if (testDetails) {
          testDetailsElement.textContent = `Selected Test: ${testDetails.Name}, Total Marks: ${testDetails.Total_Marks}, Pass Marks: ${testDetails.Pass_Marks}`;
        } else {
          testDetailsElement.textContent = "Selected test details not found.";
        }
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const selectedTestId = document.querySelector('input[name="test"]:checked',)?.value;
        const studentId = document.querySelector("#studentID").value;
        const testResult = document.querySelector("#testResult").value;

        const testResults = {
          studentId: parseInt(studentId),
          testId: parseInt(selectedTestId),
          result: parseFloat(testResult),
        };

        
        const selectedTestDetaulsResult = await getSelectedTestDetails();
        
        if (!selectedTestDetaulsResult || selectedTestDetaulsResult.error) {
            showMessage(
                "Error fetching test details: " + (selectedTestDetaulsResult ? selectedTestDetaulsResult.error : "Unknown error"), "error");
            return;
        }
            
        const selectedTestDetails = selectedTestDetaulsResult.data[0];
        const selectedTestPassMark = selectedTestDetails.Pass_Marks;

        const validationMessage = validateTestResult(testResults);

        if (validationMessage) {      
          showMessage(validationMessage, "error");
          return;
        }

        const insertQuery = `
          INSERT INTO Test_Student (Student_ID, Test_ID, Grade, Pass_Fail)
          VALUES (${studentId}, ${selectedTestId}, ${testResult}, ${testResult >= selectedTestPassMark ? 1 : 0});
        `;

        const insertResult = await runQuery(insertQuery);

        if (!insertResult || insertResult.error) {
            showMessage( "Database error" + (insertResult ? ": " + insertResult.error : ""), "error");
            return;
        } else {
            showMessage("Test result added successfully!", "success");
        }

        form.reset();
      });
    });
    </script>
