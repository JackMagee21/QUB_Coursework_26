<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Disabilities in Education</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/fixedFormStyling.css" />
  </head>
  <body>
    <div class="content">

      <div class="banner">
        <h1>Disabilities in Education</h1>
        <p>The effects on learning and development for students with disabilities</p>
      </div>

      <div class="nav">
        <p>
          <a href="index.html">Home</a> |
          <a href="addRecord.html">Add new Student Record</a> |
          <a href="readRecords.html">Read Student Records</a> |
          <a href="changeRecords.html">Edit/Delete Student Details</a> |
          <a href="addNewTestResult.html">Add New Test Result</a> |
          <a href="reports.html">Reports</a>
        </p>
      </div>

      <div class="main">
        <h2>Add a new test result to a student</h2>

        <form>

           <!-- ── Student Selection ── -->
          <div class="form-group">
            <label for="studentSelect" class="form-label select-label">Select Student:</label>
            <select id="studentSelect" name="studentID" class="form-input form-select">
              <option value="">-- Loading students... --</option>
            </select>
          </div>

          <!-- ── Test Selection ── -->
          <div class="form-group">
            <label for="testSelect" class="form-label select-label">Select Test:</label>
            <select id="testSelect" name="test" class="form-input form-select">
              <option value="">-- Select a test --</option>
              <!-- Options will be populated by JS -->
            </select>
          </div>

          <!-- ── Selected Test Info (populated by JS) ── -->
          <div id="testDetails" class="test-details"></div>

         


          <!-- ── Test Result ── -->
          <div class="form-group">
            <label for="testResult" class="form-label">Test Result:</label>
                <input type="number" id="testResult" name="testResult" class="form-input">
          </div>

          <input type="submit" class="form-btn" value="Submit" />

        </form>

        <div class="message" id="testMessage"></div>

      </div><!-- /.main -->
    </div><!-- /.content -->

    <script src="js/useSQL.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/SQL_possible_methods/student.js"></script>
    <script src="js/SQL_possible_methods/test.js"></script>
    <script>

      document.getElementById('testSelect').disabled = true;
      document.getElementById('testResult').disabled = true;

      const createSelectOptions = (options) => {
        const selectElement = document.querySelector("#testSelect");

        for (let option of options) {
          const optionElement = document.createElement("option");
          optionElement.value = option.Test_ID;
          optionElement.textContent = option.Name;
          selectElement.appendChild(optionElement);
        }
      }
      
      document.addEventListener("DOMContentLoaded", async () => {
        
        
        // ── Element references ──
        let selectedTestId       = null;
        const testSelect         = document.querySelector("#testSelect");
        const studentSelect      = document.querySelector("#studentSelect");
        const testDetailsElement = document.querySelector("#testDetails");
        const messageDiv         = document.querySelector("#testMessage");
        const form               = document.querySelector("form");
        
        // ── Helpers ──
        
  
        const determineGrade = async (score, selectedTestDetails) => {
          const selectedTestLevel = selectedTestDetails.Name.split(" ")[0]; 

          const percentage = (score / selectedTestDetails.Total_Marks) * 100;

          switch (selectedTestLevel){
            case 'KS3':
            case 'GCSE':
              if (percentage >= 90) return 'Level 9';
              if (percentage >= 80) return 'Level 8';
              if (percentage >= 70) return 'Level 7';
              if (percentage >= 60) return 'Level 6';
              if (percentage >= 50) return 'Level 5';
              if (percentage >= 40) return 'Level 4';
              if (percentage >= 30) return 'Level 3';
              if (percentage >= 20) return 'Level 2';
              return 'Level 1';
              break;
            case 'AS':
            case 'A2':
              if (percentage >= 90) return 'A*';
              if (percentage >= 80) return 'A';
              if (percentage >= 70) return 'B';
              if (percentage >= 60) return 'C';
              if (percentage >= 50) return 'D';
              if (percentage >= 40) return 'E';
              return 'U';
              break;
            case 'BTEC':
              if (percentage >= 85) return 'Distinction*';
              if (percentage >= 70) return 'Distinction';
              if (percentage >= 60) return 'Merit';
              if (percentage >= 50) return 'Pass';
              return 'Fail';
              break;
          }
        };
        
        const showMessage = (message, type) => {
          messageDiv.textContent = message;
          messageDiv.className   = `message ${type}`;
        };

        const getSelectedTestDetails = async () => {
          if (!selectedTestId) {
            return { error: "No test selected" };
          }
          const query  = `SELECT Test_ID, Name, Total_Marks, Pass_Marks FROM Test WHERE Test_ID = ${selectedTestId};`;
          const result = await runQuery(query);
          return result;
        };

        const determinePassOrFail = (score, passMark = 60) => {
          return score >= passMark ? 1 : 0;
        };

        // ── Populate student dropdown on page load ──

        const loadStudents = async () => {
          const result = await getAllStudents();

          if (!result || result.error) {
            studentSelect.innerHTML = `<option value="">-- Error loading students --</option>`;
            return;
          }

          studentSelect.innerHTML = `<option value="">-- Select a student --</option>`;
          result.data.forEach(student => {
            const option = document.createElement("option");
            option.value       = student.Student_ID;
            option.textContent = `${student.Surname}, ${student.Forename} (ID: ${student.Student_ID})`;
            studentSelect.appendChild(option);
          });
        };

        await loadStudents();

        // ── Test dropdown change: show test details ──

        testSelect.addEventListener("change", async (event) => {
          selectedTestId = event.target.value;

          if (!selectedTestId) {
            testDetailsElement.textContent = "";
            return;
          }

          const result = await getSelectedTestDetails();

          if (!result || result.error) {
            testDetailsElement.textContent = "Error fetching test details: " + (result?.error ?? "Unknown error");
            return;
          }

          const testDetails = result.data[0];

          if (testDetails) {
            testDetailsElement.textContent =
              `Selected Test: ${testDetails.Name} | ` +
              `Total Marks: ${testDetails.Total_Marks} | ` +
              `Pass Marks: ${testDetails.Pass_Marks}`;
          } else {
            testDetailsElement.textContent = "Selected test details not found.";
          }
        });

        // ── Form submit ──

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          let selectedTestId = document.querySelector("#testSelect").value;
          const studentId      = document.querySelector("#studentSelect").value;
          const testResult     = document.querySelector("#testResult").value;

          const selectedTestDetailsResult = await getSelectedTestDetails();
          if (!selectedTestDetailsResult || selectedTestDetailsResult.error) {
            showMessage("Error fetching test details for validation: " + (selectedTestDetailsResult ? selectedTestDetailsResult.error : "Unknown error"), "error");
            return;
          }
          const selectedTestDetails = selectedTestDetailsResult.data[0];

          const grade = await determineGrade(testResult, selectedTestDetails);

          const testResults = {
            studentId : studentId,
            testId    : selectedTestId,
            score     : testResult,
            grade     : grade
          };

          // Validate inputs
          const validationMessage = validateTestResult(testResults, selectedTestDetails);
          if (validationMessage) {
            showMessage(validationMessage, "error");
            return;
          }

          // Fetch test details for pass mark
          const detailsResult = await getSelectedTestDetails();
          if (!detailsResult || detailsResult.error) {
            showMessage("Error fetching test details: " + (detailsResult?.error ?? "Unknown error"), "error");
            return;
          }

          const insertResult = await AddTestResult(
            escapeSql(testResults.studentId),
            escapeSql(testResults.testId),
            escapeSql(testResults.score),
            escapeSql(testResults.grade)
          );

          if (!insertResult || insertResult.error) {
            showMessage("Database error" + (insertResult ? ": " + insertResult.error : ""), "error");
            return;
          }

          showMessage("Test result added successfully!", "success");
          form.reset();
          selectedTestId = null;
          testDetailsElement.textContent = "";

          // Reload students in case any were added
          await loadStudents();
        });

        studentSelect.addEventListener("change", async (event) => {

          const testSelect = document.querySelector("#testSelect");
          testSelect.innerHTML = `<option value="">-- Loading tests --</option>`;

          document.getElementById('testSelect').disabled = false;
          document.getElementById('testResult').disabled = false;
          
          const studentId = studentSelect.value;

          const getTestSql = `SELECT DISTINCT t.Test_ID, t.Name FROM Test t JOIN Class_Test ct on t.Test_ID = ct.Test_ID JOIN Student_Class sc ON ct.Class_ID = sc.Class_ID LEFT JOIN Test_Student ts ON t.Test_ID = ts.Test_ID AND ts.Student_ID = ${studentId} WHERE sc.Student_ID = ${studentId} AND ts.Test_ID IS NULL;`;
          console.log(getTestSql);
          const testsResult = await runQuery(getTestSql);
        
          if (!testsResult || testsResult.error) {
            testSelect.innerHTML = `<option value="">-- Error loading tests --</option>`;
            showMessage("Error fetching tests:", testsResult ? testsResult.error : "Unknown error", 'error');
            return;
          }

          console.log(testsResult);

          if(testsResult.affected_rows === 0){
            testSelect.innerHTML = `<option value="">-- No pending tests --</option>`;
            document.getElementById('testSelect').disabled = true;
            document.getElementById('testResult').disabled = true;
            return
          }
        
          createSelectOptions(testsResult.data);
        });
      });
    </script>
  </body>
</html>
