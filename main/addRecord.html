      <div class="main">
        <form>
          <h2>Adding new Student Record</h2>
          <div class="form-group">
            <label class="form-label" for="studentName">Forname</label>
            <input
              class="form-input"
              type="text"
              id="studentFirstName"
              name="studentName"
              placeholder="First Name"
              required
              oninput="saveLocalValues()"
            />
            <label class="form-label" for="studentName">Surname</label>
            <input
              class="form-input"
              type="text"
              id="studentLastName"
              name="studentName"
              placeholder="Last Name"

              oninput="saveLocalValues()"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="studentDOB">Date of Birth:</label>
            <input
              class="form-input"
              type="date"
              id="studentDOB"
              name="studentDOB"
              required
              oninput="saveLocalValues()"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="studentEmail">Email:</label>
            <input
              class="form-input"
              type="email"
              id="studentEmail"
              name="studentEmail"
              placeholder="jsheridan@qub.ac.uk"
              required
              oninput="saveLocalValues()"
            />
          </div>

          div

    <script src="js/useSQL.js"></script>
    <script src="js/validation.js"></script>
    <script>
      // define function to show message to user
      const showMessage = (text, type) => {
        const output = document.getElementById("output");
        output.textContent = text;
        output.className = `message ${type}`;
      };

      // select form
      let form = document.querySelector("form");
      //add event listener for form submit button press
      form.addEventListener("submit", async (event) => {
        event.preventDefault(); // prevent default operations from form submit

        //store input values in variables
        let studentFirstName =
          document.getElementById("studentFirstName").value;
        let studentLastName = document.getElementById("studentLastName").value;
        let studentDOB = document.getElementById("studentDOB").value;
        let studentEmail = document.getElementById("studentEmail").value;
        let studentEmergencyContactPNum = document.getElementById("emergencyContact").value;
        let studentDisabilities = Array.from(document.querySelectorAll('input[type="checkbox"][class="disability-checkbox"]:checked')).map(checkbox => checkbox.value); // check which disability checkboxes are ticked and add those values to an array
        let studentSupportNeeds = Array.from(document.querySelectorAll('input[type="checkbox"][class="support-checkbox"]:checked')).map(checkbox => checkbox.value); // same here but for support needs

        // store data in an object to pass to validation function
        const student = {
          firstName: studentFirstName,
          lastName: studentLastName,
          dob: studentDOB,
          email: studentEmail,
          emergencyContact: studentEmergencyContactPNum,
          disabilities: studentDisabilities,
          supportNeeds: studentSupportNeeds,
        };

        console.log(student);

        const validationMessage = validateStudent(student);



        if (validationMessage) {
          showMessage(validationMessage, "error");
        } else {
          // const result = await addStudentToTable(student);

          //check if query was successful
          if (result && result.success) {
            showMessage("Student added successfully!", "success");
          } else {
            showMessafe("Unable to add student.  Please try again.", "error");
          }
          clearLocalValues(); // Look at saveLocalVars.js for code
        }
      });
    </script>
