        const getReportData = async (sql) => {
            const result = await runQuery(sql);

            console.log(result);

            if (!result || !result.success) {
                console.error('Error fetching report data:', result ? result.error : 'No result returned');
                return null;
            }

            const returnedData = result.data;

            let grades = [];
            let disabilityTypes = [];

            for (let row of returnedData) {
                grades.push(row.Grade);
                disabilityTypes.push(row.Disability_Type);
            }

            return { labels: disabilityTypes, data: grades };
