    <script>
        const selectTag = document.querySelector('#reportSelector');
        const reportOutput = document.querySelector('#chartContainer');
        const tableContainer = document.querySelector('#tableContainer');
        let reportSelected;
        let chart;

        selectTag.addEventListener('change', async (event) => {
            event.preventDefault();

            if (chart) {
                chart.destroy();
            }
            
            tableContainer.innerHTML = '<canvas id="reportOutput"></canvas>';


            reportSelected = event.target.value;

            switch (reportSelected) {
                case 'report1': {
                    const sql = 'SELECT ROUND(AVG(ts.Grade), 2) AS Grade, d.Disability_Type FROM Student s JOIN Test_Student ts ON ts.Student_ID = s.Student_ID JOIN Test t ON t.Test_ID = ts.Test_ID JOIN Student_Disability_Support sds ON sds.Student_ID = s.Student_ID JOIN Disability d ON d.Disability_ID = sds.Disability_ID GROUP BY d.Disability_Type;';
    
                    const data = await getReportData(sql);

                    let labels = [];
                    let grades = [];

                    for (let row of data) {
                        labels.push(row.Disability_Type);
                        grades.push(row.Grade);
                    }

                    chart = new Chart(reportOutput, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Average Grade',
                                data: grades,
                                backgroundColor: '#2C666E'
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    max: 100
                                }
                            }
                        }
                    });

                    reportOutput.style.width = '600px';
                    reportOutput.style.height = '400px';
                    break;
                }
                    case 'report2': {
                        const sql = 'SELECT COUNT(s.Student_ID) AS numStudents, d.Disability_Type FROM Student s JOIN Student_Disability_Support sds ON sds.Student_ID = s.Student_ID JOIN Disability d ON sds.Disability_ID = d.Disability_ID GROUP BY d.Disability_Type;';
                        
                        const data = await getReportData(sql);

                        console.log(data);

                        let chartLabels = [];
                        let numStudents = [];

                        for (let row of data) {
                            chartLabels.push(row.Disability_Type);
                            numStudents.push(row.numStudents);
                        }
                        
                        chart = new Chart(reportOutput, {
                            type: 'pie',
                            data: {
                                labels: chartLabels,
                                datasets: [{
                                    label: 'Number of Students',
                                    data: numStudents
                                }]
                            },
                            options: {
                                responsive: true,
                                plugins: {
                                    legend: {
                                        position: 'left',
                                    },
                                    title: {
                                        display: true,
                                        text: 'Number of Students by Disability Type'
                                    }
                                }
                        }                    
                    });

                    reportOutput.style.width = '500px';
                    reportOutput.style.height = '500px';
                    break;
                }
                case 'report3': {
                    const sql = 'SELECT t.Test_ID, t.Name, MIN(ts.Grade) AS minGrade, MAX(ts.Grade) AS maxGrade, AVG(ts.Grade) AS avgGrade FROM Test t LEFT JOIN Test_Student ts ON t.Test_ID = ts.Test_ID GROUP BY t.Test_ID;';
                        
                    const data = await getReportData(sql);

                    console.log(data);

                    let chartLabels = [];
                    let minGrades = [];
                    let maxGrades = [];
                    let avgGrades = [];

                    for (let row of data) {
                        chartLabels.push(row.Name);
                        minGrades.push(row.minGrade);
                        maxGrades.push(row.maxGrade);
                        avgGrades.push(row.avgGrade);
                    }
                        
                    chart = new Chart(reportOutput, {
                        type: 'line',
                        data: {
                            labels: chartLabels,
                            datasets: [
                                {
                                    label: 'Maximum Grade',
                                    data: maxGrades
                                },
                                {
                                    label: 'Minimum Grade',
                                    data: minGrades
                                },
                                {
                                    label: 'Average Grade',
                                    data: avgGrades
                                }
                            ]
                        },
                            options: {
                                responsive: true,
                                plugins: {
                                    legend: {
                                    position: 'top',
                                },
                                title: {
                                    display: true,
                                    text: 'Grade Range by Test'
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    max: 100
                                }
                            }
                        }                    
                    });

                    reportOutput.style.width = '1000px';
                    reportOutput.style.height = '500px';
                    
                    break;
                }
                /* My reports (Jack)*/
                case 'report4': {
                    // With assistance
                    const assistance = await getAllStudentsWithAssistanceNoDups();
                    const noAssistance = await getAllStudentsWithoutAssistanceNoDups();

                    assistanceData = assistance.data;
                    noAssistanceData = noAssistance.data;

                    const studentIdsWithAssistance = assistanceData.map(record => record.Student_ID);
                    const studentIdsWithoutAssistance = noAssistanceData.map(record => record.Student_ID);

                    const averageMarkWithAssistance = await getAverageMarksFromStudentIds(studentIdsWithAssistance);
                    const averageMarkWithoutAssistance = await getAverageMarksFromStudentIds(studentIdsWithoutAssistance);

                    console.log(averageMarkWithAssistance);
                    console.log(averageMarkWithoutAssistance);
                    // Without assistance

                    //Chart
                    const label = ['With assistance', 'Without assistance'];
                    const marks = [averageMarkWithAssistance, averageMarkWithoutAssistance];
                    chart = new Chart(reportOutput, {
                        type: 'bar',
                        data:{
                            labels: label,
                            datasets:[{
                                label:'Average mark',
                                data: marks,
                                backgroundColor:'#2C666E'
                            }]
                        },
                        options: { 
                            responsive: true, 
                            scales: 
                            { y: 
                                { beginAtZero: true, max: 100 }
                            } 
                        }
                    });

                    reportOutput.style.width = '600px'; 
                    reportOutput.style.height = '400px';
                    break;
                }
                    // code to generate report 4
                case 'report5':
                    // code to generate report 5
                    break;
                case 'report6':
                    // code to generate report 6
                    break;
                case 'report7':
                    // code to generate report 7



                    const sql = 'SELECT s.Student_ID, s.Forename, s.Surname FROM Student s JOIN Test_Student ts ON ts.Student_ID = s.Student_ID WHERE ts.Pass_Fail = 0;';

                    const data = await getReportData(sql);

                    const table = document.createElement('table');
                    const thead = document.createElement('thead');
                    const tbody = document.createElement('tbody');

                    const headerRow = document.createElement('tr');
                    const headers = ['Student ID', 'Forename', 'Surname'];

                    for (let header of headers) {
                        const th = document.createElement('th');
                        th.textContent = header;
                        headerRow.appendChild(th);
                    }
                    thead.appendChild(headerRow);
                    table.appendChild(thead);
                    table.appendChild(tbody);

                    for (let row of data) {
                        const tr = document.createElement('tr');
                        const tdId = document.createElement('td');
                        tdId.textContent = row.Student_ID;
                        const tdForename = document.createElement('td');
                        tdForename.textContent = row.Forename;
                        const tdSurname = document.createElement('td');
                        tdSurname.textContent = row.Surname;

                        tr.appendChild(tdId);
                        tr.appendChild(tdForename);
                        tr.appendChild(tdSurname);
                        tbody.appendChild(tr);
                    }

                    tableContainer.appendChild(table);

                    console.log('got here');
                    break;
                case 'report8':
                    // code to generate report 8
                    break;
                case 'report9':
                    // code to generate report 9
                    break;
                case 'report10':
                    // code to generate report 10
                    break;
                case 'report11':
                    // code to generate report 11
                    break;
                case 'report12':
                    // code to generate report 12
                    break;
                case 'report13':
                    // code to generate report 13
                    break;
                case 'report14':
                    // code to generate report 14
                    break;
                default: 
                    tableContainer.textContent = 'Please select a report to view.';
            }
        });

        const getReportData = async (sql) => {
            const result = await runQuery(sql);

            if (!result || !result.success) {
                console.error('Error fetching report data:', result ? result.error : 'No result returned');
                return null;
            }

            return result.data;
        }

        const getReportDataFromSqlData = (sqlData) => {
            let data = [];
            let labels = [];

            for (let row of sqlData.data) {
                labels.push(Object.values(row)[1]);
                data.push(Object.values(row)[0]);
            }

            console.log(labels);
            console.log(data);

            return { labels: labels, data: data };
        }

        const getAverageMarksFromStudentIds = async (studentIds) => {
            
            const studentTestResults = await Promise.all(
                studentIds.map(studentId => getStudentMarksForTest(studentId))
            );

            const testResultsByStudent = studentTestResults.map(result => result.data);

            const averageMarksPerStudent = studentIds.map((studentId, index) => {
                const studentArray = testResultsByStudent[index];

                if(!studentArray || studentArray.length === 0){
                    return {
                        studentId,
                        average: 0
                    };
                }

                const total = studentArray.reduce(
                    (sum, r) => sum + parseFloat(r.Grade),
                    0
                );

                const ave = Number((total / studentArray.length).toFixed(2));

                return {
                    studentId,
                    average: ave
                };
            });
                    
            const marks = averageMarksPerStudent.map(r => parseFloat(r.average));
                    
            const totalAverageMarks = marks.reduce((sum, average) => sum + average, 0).toFixed(2);

            const averageMark = totalAverageMarks / studentIds.length;

            return averageMark;
        }

        
    </script>
