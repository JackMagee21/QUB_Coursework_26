        const selectTag = document.querySelector('#reportSelector');

        selectTag.addEventListener('change', async (event) => {
            event.preventDefault();

            if (chart) {

            }

            reportSelected = event.target.value;

            switch (reportSelected) {
                case 'report1':
                    sql = 'SELECT ROUND(AVG(ts.Grade), 2) AS Grade, d.Disability_Type FROM Student s JOIN Test_Student ts ON ts.Student_ID = s.Student_ID JOIN Test t ON t.Test_ID = ts.Test_ID JOIN Student_Disability_Support sds ON sds.Student_ID = s.Student_ID JOIN Disability d ON d.Disability_ID = sds.Disability_ID GROUP BY d.Disability_Type;';
    
                    data = await getReportData(sql);
    
                     chart = new Chart(reportOutput, {
                        type: 'bar',
                        data: {
                            labels: data.labels,
                            datasets: [{
                                label: 'Average Grade',
                                data: data.data,
                                backgroundColor: '#2C666E'
                            }]
                        },
                        options: {
                            responsive: false,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    max: 100
                                }
                            }
                        }
                    });

                    reportOutput.style.width = '600px';
                    reportOutput.style.height = '400px';
                    break;
                    case 'report2':
                        sql = 'SELECT COUNT(s.Student_ID) AS numStudents, d.Disability_Type FROM Student s JOIN Student_Disability_Support sds ON sds.Student_ID = s.Student_ID JOIN Disability d ON sds.Disability_ID = d.Disability_ID GROUP BY d.Disability_Type;';
                        
                        data = await getReportData(sql);
                        
                        chart = new Chart(reportOutput, {
                            type: 'pie',
                            data: {
                                labels: data.labels,
                                datasets: [{
                                    label: 'Number of Students',
                                    data: data.data
                                }]
                            },
                            options: {
                                responsive: false,
                                plugins: {
                                    legend: {
                                        position: 'left',
                                    },
                                    title: {
                                        display: true,
                                        text: 'Number of Students by Disability Type'
                                    }
                                }
                        }                    
                    });

                    reportOutput.style.width = '500px';
                    reportOutput.style.height = '500px';
                    break;

        const getReportData = async (sql) => {
            const result = await runQuery(sql);

            if (!result || !result.success) {
                console.error('Error fetching report data:', result ? result.error : 'No result returned');
                return null;
            }

            const returnedData = result.data;

            let data = [];
            let labels = [];

            for (let row of returnedData) {
                labels.push(Object.values(row)[1]);
                data.push(Object.values(row)[0]);
            }

            console.log(labels);
