<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disabilities in Education</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tableStyling.css">
</head>
<body>
    <div class="content">
        <div class="banner">
            <h1>Disabilities in Education</h1>
            <p>The effects on learning and development for students with disabilities</p>
        </div>
        <div class="nav">
            <p>
                <a href="index.html">Home</a> |
                <a href="addRecord.html">Add new Student Record</a> |
                <a href="readRecords.html">Read Student Records</a> |
                <a href="changeRecords.html">Edit/Delete Student Details</a> | 
                <a href="reports.html">Reports</a>
            </p>
        </div>
        <div class="main">
            <h2>Student Records</h2>
            <table>
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>DOB</th>
                        <th>Emergency Contact</th>

                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Student records will be dynamically inserted here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/useSQL.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const sql = "SELECT * FROM Student;";
            const result = await runQuery(sql);
            const students = result.data;

            for (student of students){
                let tableBody = document.querySelector('#tableBody');
                let newRow = tableBody.insertRow();
                newRow.insertCell(0).textContent = student.Student_ID;
                newRow.insertCell(1).textContent = student.Forename + " " + student.Surname;
                newRow.insertCell(2).textContent = student.Email;
                newRow.insertCell(3).textContent = student.DOB;
                newRow.insertCell(4).textContent = student.Emergency_Contact;
            }
        });

        

    </script>
</body>
</html>
