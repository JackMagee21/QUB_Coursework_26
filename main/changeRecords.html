    <script>
        // initialize variable for keeping track of the student the user wants to edit/delete/
        let selectedStudentID = null;

        // show message to user after they perfom an action
        const showMessage = (text, type) => {
          const output = document.querySelector("#output");
          output.textContent = text;
          output.className = `message ${type}`;
        };

        // clears the message so user wont get confused after doing multiple things in a row
        const clearMessage = () => {
          const output = document.querySelector("#output");
          output.textContent = "";
          output.className = "message";
        };

        // resets all form elements
        const resetForm = () => {
            const form = document.querySelector("#edit-form")
            const selectedStudentText = document.querySelector("#selectedStudentText");
            
            form.reset();

            selectedStudentID = null;
            selectedStudentText.textContent = "Choose a student from the table first.";
        }


        const selectStudent = (student) => {
            resetForm();
            const selectedStudentText = document.querySelector("#selectedStudentText");
            
            // copy the values from the chosen student into the form so they can be edited
            selectedStudentID = Number(student.StudentID);
            document.querySelector("#studentID").value = student.Student_ID;
            document.querySelector("#studentFirstName").value = student.Forename;
            document.querySelector("#studentLastName").value = student.Surname;
            document.querySelector("#studentDOB").value = student.Date_of_Birth;
            document.querySelector("#studentEmail").value = student.Email;
            
            // Check the checkboxes that match the student's disabilities
            const disabilities = student.Disabilities ? student.Disabilities.split(", ") : [];
            for (let disability of disabilities) {
                const checkbox = document.querySelector(`input[type=checkbox][id="${disability}"]`);
                if (checkbox) {
                    checkbox.checked = true;
                }
            }

            selectedStudentText.textContent = `Editing student #${student.Student_ID}: ${student.Forename} ${student.Surname}`;
            clearMessage();
        };

        const printTable = async () => {
            const output = document.querySelector("#table-output");
            output.textContent = "";

            const sql = "SELECT s.Student_ID, s.Forename, s.Surname, s.Email, s.Emergency_Contact, GROUP_CONCAT(DISTINCT d.Disability_Name SEPARATOR ', ') AS Disabilities FROM Student_Disability_Support sds JOIN Disability d ON sds.Disability_ID = d.Disability_ID JOIN Student s ON sds.Student_ID = s.Student_ID GROUP BY s.Student_ID ORDER BY s.Student_ID;";
            const result = await runQuery(sql);
            const data = result.data;



            // check if the data was returned properly
            if (!result || !result.data || result.data.length === 0) {
                output.textContent = "No student records found.";
                return;
            }

            const rows = result.data;

            // create the table and the header row
            const table = document.createElement("table");
            const headerRow = document.createElement("tr");
            table.appendChild(headerRow);

            // create column headings
            const headings = ["Student ID", "First Name", "Last Name", "Email", "Emergency Contact", "Disabilities", "Action"];

            for (let heading of headings) {
                const th = document.createElement("th");
                th.textContent = heading;
                headerRow.appendChild(th);
            }

            // add each row returned from sql query to table
            for (let row of rows) {

                //create the row
                const tr = document.createElement("tr");
                
                //create a cell for each value in the row
                const tdStudentID = document.createElement("td");
                tdStudentID.textContent = row.Student_ID;
                tr.appendChild(tdStudentID);

                const tdFirstName = document.createElement("td");
                tdFirstName.textContent = row.Forename;
                tr.appendChild(tdFirstName);

                const tdLastName = document.createElement("td");
                tdLastName.textContent = row.Surname;
                tr.appendChild(tdLastName);

                const tdEmail = document.createElement("td");
                tdEmail.textContent = row.Email;
                tr.appendChild(tdEmail);

                const tdEmergencyContact = document.createElement("td");
                tdEmergencyContact.textContent = row.Emergency_Contact;
                tr.appendChild(tdEmergencyContact);

                const tdDisabilities = document.createElement("td");
                tdDisabilities.textContent = row.Disabilities;
                tr.appendChild(tdDisabilities);

                const tdAction = document.createElement("td");

                //create the edit button
                const editButton = document.createElement("button");
                editButton.textContent = "Edit";
                editButton.addEventListener("click", () => {
                    // select this student
                    selectStudent(row);
                });

                tdAction.appendChild(editButton);

                // create delete button
                const deleteButton = document.createElement("button");
                deleteButton.textContent = "Delete";
                deleteButton.addEventListener("click", async () => {
                    // ask user for confirmation before deleting a student permanently
                    const confrimed = confirm(`Delete student #${row.Student_ID}: ${row.Forename} ${row.Surname}? This action cannot be undone.`);
                    if (!confirmed) {
                        return;
                    }

                    // delete student record
                    const deleteSQL = `DELETE FROM Student WHERE Student_ID = ${row.Student_ID};`;
                    const deleteResult = await runQuery(deleteSQL);

                    if (deleteResult && deleteResult.success) {
                        showMessage("Student record permanently deleted.", "success");

                        if (selectedStudentID === Number(row.Student_ID)) {
                            resetForm();
                        }

                        printTable();
                        return;
                    }

                    if (deleteResult && deleteResult.error) {
                        showMessage(deleteResult.error, "error");
                    } else {
                        showMessage("Unable to delete the record.", "error");
                    }
                });
                tdAction.appendChild(deleteButton);
                tr.appendChild(tdAction);

                table.appendChild(tr);
            }

            output.appendChild(table);
    };

    // wait for page to load before adding event listeners to elements and creating the table
    document.addEventListener("DOMContentLoaded", () => {
        const form = document.querySelector("#edit-form");

        resetForm();
        printTable();

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            // check if student has been selected
            if (selectedSyudentID === null) {
                showMessage("Please choose a student to edit.", "error");

            // create object for student details
            const student = {
                studentID: Number(document.querySelector("#studentID").value),
                firstName: document.querySelector("#studentFirstName").value,
                lastName: document.querySelector("#studentLastName").value,
                email: document.querySelector("#studentEmail").value,
                disabilities: Array.from(document.querySelectorAll("input[type=checkbox]:checked")).map((checkbox) => checkbox.value)
            }

            
            // validate student details
            const validationMessage = validateStudent(student);

            if(validationMessage) {
                showMessage(validationMessage, "error");
                return;
            }

            if (updateStudentResult && updateStudentResult.error) {
                showMessage(updateStudentResult.error, "error");
            } else {
                showMessage("Unable to update the record.", "error");
            }
            */
        });
    });

    </script>
